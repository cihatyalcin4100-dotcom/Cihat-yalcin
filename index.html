<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>world of word</title>
  <style>
    * { box-sizing: border-box; }
    html, body { overflow-x: hidden; overscroll-behavior: none; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f5f7;
      color: #222;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }
    .screen {
      display: none;
      max-width: 560px;
      margin: 0 auto;
      padding: 18px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      margin-top: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    h1, h2 {
      text-align: center;
      margin: 0 0 16px;
    }
    .menu-btn,
    .choice-btn,
    .danger-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 17px;
      cursor: pointer;
      margin-top: 12px;
      touch-action: manipulation;
    }
    .menu-btn {
      background: #222;
      color: #fff;
    }
    .danger-btn {
      background: #b83a3a;
      color: #fff;
    }
    .choice-btn {
      background: #e9edf3;
      color: #222;
      text-align: left;
    }
    .choice-btn.correct {
      background: #33a35c;
      color: #fff;
    }
    .choice-btn.wrong {
      background: #da4f4f;
      color: #fff;
    }
    .word-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 10px 0 18px;
      flex-wrap: wrap;
    }
    .word {
      font-size: 34px;
      font-weight: bold;
      text-align: center;
      word-break: break-word;
    }
    .speaker-btn,
    .icon-btn,
    .nav-btn {
      border: none;
      background: #eef2f6;
      border-radius: 12px;
      width: 48px;
      height: 48px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      touch-action: manipulation;
    }
    .speaker-btn:active,
    .icon-btn:active,
    .nav-btn:active {
      transform: scale(0.97);
    }
    .icon-btn-row {
      display: flex;
      justify-content: center;
      margin-top: 12px;
    }
    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      gap: 12px;
    }
    .nav-spacer {
      flex: 1;
    }
    .hint-box {
      display: none;
      margin-top: 16px;
      background: #fff8d7;
      border: 1px solid #ecd98d;
      padding: 14px;
      border-radius: 14px;
      text-align: left;
    }
    .hint-title {
      font-weight: bold;
      margin-bottom: 8px;
    }
    .hint-image {
      display: none;
      width: 100%;
      max-height: 240px;
      object-fit: contain;
      margin-top: 10px;
      border-radius: 14px;
      background: #fff;
    }
    .status {
      margin-top: 16px;
      text-align: center;
      font-weight: bold;
      min-height: 22px;
    }
    .small-count {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
    }
    .question-box {
      font-size: 22px;
      font-weight: bold;
      line-height: 1.45;
      text-align: center;
      margin: 10px 0 18px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
      font-size: 15px;
    }
    th {
      background: #f1f3f5;
    }
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 9999;
      padding: 20px;
    }
    .modal-card {
      max-width: 420px;
      margin: 120px auto 0;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }
    .modal-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 16px;
    }
  </style>
</head>

  <section id="homeScreen" class="screen">

  </section>

  <section id="testScreen" class="screen">

      </div>

      <div id="choices"></div>

        <div id="hintText"></div>
        <img id="hintImage" class="hint-image" src="" alt="İpucu görseli">
      </div>

      <div id="status" class="status"></div>

      <div class="nav-row">
        <button id="prevBtn" class="nav-btn" title="Önceki">◀</button>
        <div class="nav-spacer"></div>
        <button id="nextBtn" class="nav-btn" title="Sonraki">▶</button>
      </div>

      <button id="addCompletedBtn" class="menu-btn">Tamamlanana Ekle</button>
      <button id="testHomeBtn" class="menu-btn">Ana Menü</button>
    </div>
  </section>

  <section id="completedScreen" class="screen">
    <div class="card">
      <div id="completedCount" class="small-count">0/0</div>

      <div class="word-row">
        <div id="completedWord" class="word">word</div>
        <button id="completedSpeakBtn" class="speaker-btn" title="Telaffuz">🔊</button>
      </div>

      <div id="completedChoices"></div>

      <div class="icon-btn-row">
        <button id="completedHintBtn" class="icon-btn" title="İpucu">💡</button>
      </div>

      <div id="completedHintBox" class="hint-box">
        <div class="hint-title">İpucu</div>
        <div id="completedHintText"></div>
        <img id="completedHintImage" class="hint-image" src="" alt="İpucu görseli">
      </div>

      <div id="completedStatus" class="status"></div>

      <div class="nav-row">
        <button id="completedPrevBtn" class="nav-btn" title="Önceki">◀</button>
        <div class="nav-spacer"></div>
        <button id="completedNextBtn" class="nav-btn" title="Sonraki">▶</button>
      </div>

      <button id="clearCompletedBtn" class="danger-btn">Temizle</button>
      <button id="completedHomeBtn" class="menu-btn">Ana Menü</button>
    </div>
  </section>

  <section id="connectorsScreen" class="screen">
    <div class="card">
      <div id="connectorCount" class="small-count">0/0</div>
      <div id="connectorType" class="small-count">Bağlaç Çalışması</div>

      <div id="connectorQuestion" class="question-box">Soru</div>

      <div id="connectorChoices"></div>

      <div id="connectorStatus" class="status"></div>

      <div class="nav-row">
        <button id="connectorPrevBtn" class="nav-btn" title="Önceki">◀</button>
        <div class="nav-spacer"></div>
        <button id="connectorNextBtn" class="nav-btn" title="Sonraki">▶</button>
      </div>

      <button id="connectorsHomeBtn" class="menu-btn">Ana Menü</button>
    </div>
  </section>

  <section id="statsScreen" class="screen">
    <div class="card">
      <h2>Test Sonucu</h2>
      <table>
        <tr>
          <th>Toplam Kelime</th>
          <th>Cevaplanan</th>
          <th>Doğru</th>
          <th>Yanlış</th>
        </tr>
        <tr>
          <td id="statTotalWords">0</td>
          <td id="statAnswered">0</td>
          <td id="statCorrect">0</td>
          <td id="statWrong">0</td>
        </tr>
      </table>
      <button id="resetStatsBtn" class="danger-btn">İstatistikleri Sıfırla</button>
      <button id="statsHomeBtn" class="menu-btn">Ana Menü</button>
    </div>
  </section>

    <div class="modal-card">

      <button id="confirmClearCompletedBtn" class="danger-btn">Evet</button>

    const WORDS = [];
    const SEEN_WORDS = new Set();
    for (const word of RAW_WORDS) {
      const key = (word.en || "").trim().toLowerCase();
      if (!key) continue;
      if (SEEN_WORDS.has(key)) continue;
      SEEN_WORDS.add(key);
      WORDS.push(word);
    }

    const CONNECTORS = [
      { type:"fill", typeLabel:"Boşluk Doldurma", q:"He was tired; ______, he continued working.", options:["however","therefore","because"], answer:"however" },

    let completedWords = [];
    let answeredMap = {};
    let sessionWords = [];
    let currentIndex = -1;
    let currentWord = null;
    let completedIndex = 0;
    let connectorIndex = 0;

    function loadState() {
      try {
        completedWords = JSON.parse(localStorage.getItem("wowCompletedWords")) || [];
      } catch {
        completedWords = [];
      }
      resetSessionStats();
    }

    function savePersistentState() {
      localStorage.setItem("wowCompletedWords", JSON.stringify(completedWords));
    }

    function resetSessionStats() {
      answeredMap = {};
      sessionWords = [];
      currentIndex = -1;
      currentWord = null;
    }

    function show(screenId) {
      document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
      document.getElementById(screenId).style.display = "block";
    }

    function showHome() {
      hideClearCompletedModal();
      show("homeScreen");
    }

    function shuffle(arr) {
      let a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function uniquePushWord(list, word) {
      if (!list.some(w => w.en === word.en)) {
        list.push({ ...word });
      }
    }

    function buildChoices(word) {
      return shuffle([word.tr, ...word.d]);
    }

    function speakWord(word) {
      if (!word) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(word.en);
      u.lang = "en-US";
      u.rate = 0.9;
      speechSynthesis.speak(u);
    }

    function renderHint(boxId, textId, imageId, word) {
      const hintBox = document.getElementById(boxId);
      const hintText = document.getElementById(textId);
      const hintImage = document.getElementById(imageId);

      hintBox.style.display = "block";

      if (word.type === "object" && word.img) {
        hintText.textContent = "";
        hintImage.src = word.img;
        hintImage.style.display = "block";
      } else {
        hintText.textContent = word.hint || "";
        hintImage.style.display = "none";
        hintImage.src = "";
      }
    }

    function markAnswer(word, isCorrect) {
      if (!answeredMap[word.en]) {
        answeredMap[word.en] = { result: isCorrect ? "correct" : "wrong" };
      }
    }

    function applySavedStateToButtons(word, buttons) {
      const saved = answeredMap[word.en];
      if (!saved) return;
      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === word.tr) btn.classList.add("correct");
      });
    }

    function updateNavButtons() {
      document.getElementById("prevBtn").disabled = currentIndex <= 0;
      document.getElementById("nextBtn").disabled = currentIndex >= sessionWords.length - 1;
    }

    function updateCompletedNavButtons() {
      const prev = document.getElementById("completedPrevBtn");
      const next = document.getElementById("completedNextBtn");
      if (!completedWords.length) {
        prev.disabled = true;
        next.disabled = true;
        return;
      }
      prev.disabled = completedIndex <= 0;
      next.disabled = completedIndex >= completedWords.length - 1;
    }

    function updateConnectorNavButtons() {
      document.getElementById("connectorPrevBtn").disabled = connectorIndex <= 0;
      document.getElementById("connectorNextBtn").disabled = connectorIndex >= CONNECTORS.length - 1;
    }

    function renderMainQuestion() {
      show("testScreen");

      const hintBox = document.getElementById("hintBox");
      const hintText = document.getElementById("hintText");
      const hintImage = document.getElementById("hintImage");
      const choicesBox = document.getElementById("choices");

      hintBox.style.display = "none";
      hintText.textContent = "";
      hintImage.style.display = "none";
      hintImage.src = "";
      choicesBox.innerHTML = "";
      document.getElementById("status").textContent = "";

      if (!sessionWords.length || currentIndex < 0 || currentIndex >= sessionWords.length) {
        document.getElementById("testCount").textContent = "0/0";
        document.getElementById("word").textContent = "Kelime yok";
        updateNavButtons();
        return;
      }

      currentWord = sessionWords[currentIndex];
      document.getElementById("testCount").textContent = `${currentIndex + 1}/${sessionWords.length}`;
      document.getElementById("word").textContent = currentWord.en;

      buildChoices(currentWord).forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = choice;
        btn.addEventListener("click", () => {
          if (answeredMap[currentWord.en]) return;

          if (choice === currentWord.tr) {
            btn.classList.add("correct");
            markAnswer(currentWord, true);
          } else {
            btn.classList.add("wrong");
            markAnswer(currentWord, false);
          }
          applySavedStateToButtons(currentWord, document.querySelectorAll("#choices .choice-btn"));
          openResultSilently();
        });
        choicesBox.appendChild(btn);
      });

      if (answeredMap[currentWord.en]) {
        applySavedStateToButtons(currentWord, document.querySelectorAll("#choices .choice-btn"));
      }

      updateNavButtons();
    }

    function renderCompletedQuestion() {
      show("completedScreen");

      if (!completedWords.length) {
        document.getElementById("completedCount").textContent = "0/0";
        document.getElementById("completedWord").textContent = "Kelime yok";
        document.getElementById("completedChoices").innerHTML = "";
        document.getElementById("completedHintBox").style.display = "none";
        updateCompletedNavButtons();
        return;
      }

      if (completedIndex < 0) completedIndex = 0;
      if (completedIndex >= completedWords.length) completedIndex = completedWords.length - 1;

      const word = completedWords[completedIndex];
      currentWord = word;

      document.getElementById("completedCount").textContent = `${completedIndex + 1}/${completedWords.length}`;
      document.getElementById("completedWord").textContent = word.en;
      document.getElementById("completedHintBox").style.display = "none";
      document.getElementById("completedHintText").textContent = "";
      document.getElementById("completedHintImage").style.display = "none";
      document.getElementById("completedHintImage").src = "";
      document.getElementById("completedStatus").textContent = "";

      const choicesBox = document.getElementById("completedChoices");
      choicesBox.innerHTML = "";

      buildChoices(word).forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = choice;
        btn.addEventListener("click", () => {
          document.querySelectorAll("#completedChoices .choice-btn").forEach(b => {
            b.disabled = true;
            if (b.textContent === word.tr) b.classList.add("correct");
          });
          if (choice !== word.tr) btn.classList.add("wrong");
        });
        choicesBox.appendChild(btn);
      });

      updateCompletedNavButtons();
    }

    function renderConnectorQuestion() {
      show("connectorsScreen");

      if (!CONNECTORS.length) {
        document.getElementById("connectorCount").textContent = "0/0";
        document.getElementById("connectorQuestion").textContent = "Soru yok";
        document.getElementById("connectorChoices").innerHTML = "";
        return;
      }

      if (connectorIndex < 0) connectorIndex = 0;
      if (connectorIndex >= CONNECTORS.length) connectorIndex = CONNECTORS.length - 1;

      const item = CONNECTORS[connectorIndex];
      document.getElementById("connectorCount").textContent = `${connectorIndex + 1}/${CONNECTORS.length}`;
      document.getElementById("connectorType").textContent = item.typeLabel;
      document.getElementById("connectorStatus").textContent = "";

      let qText = item.q;
      if (item.type === "meaning" || item.type === "group") {
        qText = item.q;
      }
      document.getElementById("connectorQuestion").textContent = qText;

      const box = document.getElementById("connectorChoices");
      box.innerHTML = "";

      item.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = opt;
        btn.addEventListener("click", () => {
          document.querySelectorAll("#connectorChoices .choice-btn").forEach(b => {
            b.disabled = true;
            if (b.textContent === item.answer) b.classList.add("correct");
          });
          if (opt !== item.answer) btn.classList.add("wrong");
        });
        box.appendChild(btn);
      });

      updateConnectorNavButtons();
    }

    function startTest() {
      resetSessionStats();

      const filteredWords = WORDS.filter(
        w => !completedWords.some(c => c.en === w.en)
      );

      if (!filteredWords.length) {
        alert("Tüm kelimeler tamamlananlara eklendi.");
        showHome();
        return;
      }

      sessionWords = shuffle(filteredWords).map(w => ({ ...w }));
      currentIndex = 0;
      renderMainQuestion();
    }

    function openCompletedTest() {
      completedIndex = 0;
      renderCompletedQuestion();
    }

    function openConnectors() {
      connectorIndex = 0;
      renderConnectorQuestion();
    }

    function goPrevWord() {
      if (currentIndex > 0) {
        currentIndex--;
        renderMainQuestion();
      }
    }

    function goNextWord() {
      if (currentIndex < sessionWords.length - 1) {
        currentIndex++;
        renderMainQuestion();
      }
    }

    function goCompletedPrev() {
      if (completedIndex > 0) {
        completedIndex--;
        renderCompletedQuestion();
      }
    }

    function goCompletedNext() {
      if (completedIndex < completedWords.length - 1) {
        completedIndex++;
        renderCompletedQuestion();
      }
    }

    function goConnectorPrev() {
      if (connectorIndex > 0) {
        connectorIndex--;
        renderConnectorQuestion();
      }
    }

    function goConnectorNext() {
      if (connectorIndex < CONNECTORS.length - 1) {
        connectorIndex++;
        renderConnectorQuestion();
      }
    }

    function getCorrectCount() {
      return Object.values(answeredMap).filter(v => v.result === "correct").length;
    }

    function getWrongCount() {
      return Object.values(answeredMap).filter(v => v.result === "wrong").length;
    }

    function openResultSilently() {
      document.getElementById("statTotalWords").textContent = WORDS.length;
      document.getElementById("statAnswered").textContent = Object.keys(answeredMap).length;
      document.getElementById("statCorrect").textContent = getCorrectCount();
      document.getElementById("statWrong").textContent = getWrongCount();
    }

    function openResult() {
      show("statsScreen");
      openResultSilently();
    }

    function addCompleted() {
      if (!currentWord) return;
      uniquePushWord(completedWords, currentWord);
      savePersistentState();
      renderMainQuestion();
    }

    function resetStats() {
      resetSessionStats();
      openResult();
    }

    function showClearCompletedModal() {
      document.getElementById("clearCompletedModal").style.display = "block";
    }

    function hideClearCompletedModal() {
      document.getElementById("clearCompletedModal").style.display = "none";
    }

    function clearCompletedWords() {
      completedWords = [];
      localStorage.removeItem("wowCompletedWords");
      hideClearCompletedModal();
      openCompletedTest();
    }

    document.getElementById("startTestBtn").addEventListener("click", startTest);
    document.getElementById("showStatsBtn").addEventListener("click", openResult);
    document.getElementById("showCompletedBtn").addEventListener("click", openCompletedTest);
    document.getElementById("showConnectorsBtn").addEventListener("click", openConnectors);

    document.getElementById("speakBtn").addEventListener("click", () => speakWord(currentWord));
    document.getElementById("hintBtn").addEventListener("click", () => currentWord && renderHint("hintBox", "hintText", "hintImage", currentWord));
    document.getElementById("prevBtn").addEventListener("click", goPrevWord);
    document.getElementById("nextBtn").addEventListener("click", goNextWord);
    document.getElementById("addCompletedBtn").addEventListener("click", addCompleted);
    document.getElementById("testHomeBtn").addEventListener("click", showHome);

    document.getElementById("completedSpeakBtn").addEventListener("click", () => speakWord(currentWord));
    document.getElementById("completedHintBtn").addEventListener("click", () => currentWord && renderHint("completedHintBox", "completedHintText", "completedHintImage", currentWord));
    document.getElementById("completedPrevBtn").addEventListener("click", goCompletedPrev);
    document.getElementById("completedNextBtn").addEventListener("click", goCompletedNext);
    document.getElementById("clearCompletedBtn").addEventListener("click", showClearCompletedModal);
    document.getElementById("completedHomeBtn").addEventListener("click", showHome);

    document.getElementById("connectorPrevBtn").addEventListener("click", goConnectorPrev);
    document.getElementById("connectorNextBtn").addEventListener("click", goConnectorNext);
    document.getElementById("connectorsHomeBtn").addEventListener("click", showHome);

    document.getElementById("resetStatsBtn").addEventListener("click", resetStats);
    document.getElementById("statsHomeBtn").addEventListener("click", showHome);

    document.getElementById("confirmClearCompletedBtn").addEventListener("click", clearCompletedWords);
    document.getElementById("cancelClearCompletedBtn").addEventListener("click", hideClearCompletedModal);

    document.addEventListener("dblclick", function (e) {
      e.preventDefault();
    }, { passive: false });

    loadState();
    showHome();
  </script>
</body>
</html>
