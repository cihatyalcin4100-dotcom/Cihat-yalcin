<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>world of word</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      overflow-x: hidden;
      overscroll-behavior: none;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f5f7;
      color: #222;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    .screen {
      display: none;
      max-width: 560px;
      margin: 0 auto;
      padding: 18px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      margin-top: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1, h2 {
      text-align: center;
      margin: 0 0 16px;
    }

    .menu-btn,
    .choice-btn,
    .danger-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 17px;
      cursor: pointer;
      margin-top: 12px;
      touch-action: manipulation;
    }

    .menu-btn {
      background: #222;
      color: #fff;
    }

    .danger-btn {
      background: #b83a3a;
      color: #fff;
    }

    .choice-btn {
      background: #e9edf3;
      color: #222;
      text-align: left;
    }

    .choice-btn.correct {
      background: #33a35c;
      color: #fff;
    }

    .choice-btn.wrong {
      background: #da4f4f;
      color: #fff;
    }

    .word-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 10px 0 18px;
      flex-wrap: wrap;
    }

    .word {
      font-size: 34px;
      font-weight: bold;
      text-align: center;
      word-break: break-word;
    }

    .speaker-btn,
    .icon-btn,
    .nav-btn {
      border: none;
      background: #eef2f6;
      border-radius: 12px;
      width: 48px;
      height: 48px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      touch-action: manipulation;
    }

    .speaker-btn:active,
    .icon-btn:active,
    .nav-btn:active {
      transform: scale(0.97);
    }

    .icon-btn-row {
      display: flex;
      justify-content: center;
      margin-top: 12px;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      gap: 12px;
    }

    .nav-spacer {
      flex: 1;
    }

    .hint-box {
      display: none;
      margin-top: 16px;
      background: #fff8d7;
      border: 1px solid #ecd98d;
      padding: 14px;
      border-radius: 14px;
      text-align: left;
    }

    .hint-title {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .hint-image {
      display: none;
      width: 100%;
      max-height: 240px;
      object-fit: contain;
      margin-top: 10px;
      border-radius: 14px;
      background: #fff;
    }

    .status {
      margin-top: 16px;
      text-align: center;
      font-weight: bold;
      min-height: 22px;
    }

    .small-count {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
      font-size: 15px;
    }

    th {
      background: #f1f3f5;
    }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 9999;
      padding: 20px;
    }

    .modal-card {
      max-width: 420px;
      margin: 120px auto 0;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }

    .modal-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 16px;
    }
  </style>
</head>

      { en:"adjust", tr:"ayarlamak", hint:"Adjust the settings.", d:["bozmak","kaldırmak"] },
      { en:"administration", tr:"yönetim", hint:"The administration decided.", d:["plan","sistem"] },
      { en:"admit", tr:"kabul etmek", hint:"He admitted the mistake.", d:["reddetmek","saklamak"] },
      { en:"adopt", tr:"benimsemek", hint:"They adopted a new rule.", d:["reddetmek","iptal etmek"] },
      { en:"advance", tr:"ilerleme", hint:"Science made advances.", d:["gerileme","engel"] },

      { en:"advantage", tr:"avantaj", hint:"This has many advantages.", d:["dezavantaj","engel"] },
      { en:"annual", tr:"yıllık", hint:"The annual report is ready.", d:["aylık","günlük"] },
      { en:"assess", tr:"değerlendirmek", hint:"Experts assess the risk.", d:["gizlemek","reddetmek"] },
      { en:"assign", tr:"atamak", hint:"The teacher assigned homework.", d:["iptal etmek","reddetmek"] },
      { en:"assist", tr:"yardım etmek", hint:"Nurses assist doctors.", d:["engellemek","reddetmek"] },
      { en:"authority", tr:"yetki", hint:"The authority approved it.", d:["engel","karar"] },
      { en:"available", tr:"mevcut", hint:"The service is available.", d:["yok","zor"] },
      { en:"aware", tr:"farkında", hint:"People are aware of risks.", d:["habersiz","uzak"] },
      { en:"capacity", tr:"kapasite", hint:"The room capacity is 200.", d:["engel","sınır"] },
      { en:"category", tr:"kategori", hint:"Books are in categories.", d:["yöntem","teori"] },
      { en:"allocate", tr:"tahsis etmek", hint:"Funds are allocated to education.", d:["dağıtmak","saklamak"] },

      { en:"device", tr:"cihaz", type:"object", img:makeEmojiImage("📱"), d:["yöntem","sistem"] },
      { en:"tool", tr:"alet", type:"object", img:makeEmojiImage("🔧"), d:["makine","parça"] },
      { en:"machine", tr:"makine", type:"object", img:makeEmojiImage("⚙️"), d:["araç","alet"] },
      { en:"vehicle", tr:"araç", type:"object", img:makeEmojiImage("🚗"), d:["yol","motor"] },
      { en:"cell", tr:"hücre", type:"object", img:makeEmojiImage("🧬"), d:["organ","doku"] },
      { en:"drug", tr:"ilaç", type:"object", img:makeEmojiImage("💊"), d:["vitamin","madde"] },
      { en:"seed", tr:"tohum", type:"object", img:makeEmojiImage("🌱"), d:["bitki","toprak"] },
      { en:"soil", tr:"toprak", type:"object", img:makeEmojiImage("🟫"), d:["kum","taş"] },
      { en:"bridge", tr:"köprü", type:"object", img:makeEmojiImage("🌉"), d:["yol","tünel"] },
      { en:"engine", tr:"motor", type:"object", img:makeEmojiImage("🚂"), d:["araç","yakıt"] }
    ];

    let completedWords = [];
    let reviewWords = [];
    let answeredMap = {};
    let sessionWords = [];
    let currentIndex = -1;
    let currentWord = null;
    let reviewIndex = 0;
    let completedIndex = 0;

    function loadState() {
      try {
        completedWords = JSON.parse(localStorage.getItem("wowCompletedWords")) || [];
        reviewWords = JSON.parse(localStorage.getItem("wowReviewWords")) || [];
      } catch {
        completedWords = [];
        reviewWords = [];
      }
      resetSessionStats();
    }

    function savePersistentState() {
      localStorage.setItem("wowCompletedWords", JSON.stringify(completedWords));
      localStorage.setItem("wowReviewWords", JSON.stringify(reviewWords));
    }

    function resetSessionStats() {
      answeredMap = {};
      sessionWords = [];
      currentIndex = -1;
      currentWord = null;
    }

    function show(screenId) {
      document.querySelectorAll(".screen").forEach(s => {
        s.style.display = "none";
      });
      document.getElementById(screenId).style.display = "block";
    }

    function showHome() {
      hideClearModal();
      show("homeScreen");
    }

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function uniquePushWord(list, word) {
      if (!list.some(w => w.en === word.en)) {
        list.push({ ...word });
      }
    }

    function removeWord(list, word) {
      return list.filter(w => w.en !== word.en);
    }

    function buildChoices(word) {
      return shuffle([word.tr, ...word.d]);
    }

    function speakWord(word) {
      if (!word) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(word.en);
      u.lang = "en-US";
      u.rate = 0.9;
      speechSynthesis.speak(u);
    }

    function renderHint(boxId, textId, imageId, word) {
      const hintBox = document.getElementById(boxId);
      const hintText = document.getElementById(textId);
      const hintImage = document.getElementById(imageId);

      hintBox.style.display = "block";

      if (word.type === "object" && word.img) {
        hintText.textContent = "";
        hintImage.src = word.img;
        hintImage.style.display = "block";
      } else {
        hintText.textContent = word.hint || "";
        hintImage.style.display = "none";
        hintImage.src = "";
      }
    }

    function markAnswer(word, isCorrect) {
      if (!answeredMap[word.en]) {
        answeredMap[word.en] = {
          result: isCorrect ? "correct" : "wrong"
        };
      }
    }

    function applySavedStateToButtons(word, buttons) {
      const saved = answeredMap[word.en];
      if (!saved) return;

      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === word.tr) {
          btn.classList.add("correct");
        }
      });
    }

    function updateNavButtons() {
      document.getElementById("prevBtn").disabled = currentIndex <= 0;
      document.getElementById("nextBtn").disabled = currentIndex >= sessionWords.length - 1;
    }

    function updateReviewNavButtons() {
      const prev = document.getElementById("reviewPrevBtn");
      const next = document.getElementById("reviewNextBtn");

      if (!reviewWords.length) {
        prev.disabled = true;
        next.disabled = true;
        return;
      }

      prev.disabled = reviewIndex <= 0;
      next.disabled = reviewIndex >= reviewWords.length - 1;
    }

    function updateCompletedNavButtons() {
      const prev = document.getElementById("completedPrevBtn");
      const next = document.getElementById("completedNextBtn");

      if (!completedWords.length) {
        prev.disabled = true;
        next.disabled = true;
        return;
      }

      prev.disabled = completedIndex <= 0;
      next.disabled = completedIndex >= completedWords.length - 1;
    }

    function renderMainQuestion() {
      show("testScreen");

      const hintBox = document.getElementById("hintBox");
      const hintText = document.getElementById("hintText");
      const hintImage = document.getElementById("hintImage");
      const choicesBox = document.getElementById("choices");

      hintBox.style.display = "none";
      hintText.textContent = "";
      hintImage.style.display = "none";
      hintImage.src = "";
      choicesBox.innerHTML = "";
      document.getElementById("status").textContent = "";

      if (!sessionWords.length || currentIndex < 0 || currentIndex >= sessionWords.length) {
        document.getElementById("testCount").textContent = "0/0";
        document.getElementById("word").textContent = "Kelime yok";
        updateNavButtons();
        return;
      }

      currentWord = sessionWords[currentIndex];
      document.getElementById("testCount").textContent = `${currentIndex + 1}/${sessionWords.length}`;
      document.getElementById("word").textContent = currentWord.en;

      const choices = buildChoices(currentWord);

      choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = choice;

        btn.addEventListener("click", () => {
          if (answeredMap[currentWord.en]) return;

          if (choice === currentWord.tr) {
            btn.classList.add("correct");
            markAnswer(currentWord, true);
          } else {
            btn.classList.add("wrong");
            markAnswer(currentWord, false);
          }

          applySavedStateToButtons(currentWord, document.querySelectorAll("#choices .choice-btn"));
          openResultSilently();
        });

        choicesBox.appendChild(btn);
      });

      if (answeredMap[currentWord.en]) {
        applySavedStateToButtons(currentWord, document.querySelectorAll("#choices .choice-btn"));
      }

      updateNavButtons();
    }

    function renderSecondaryQuestion(word, cfg) {
      currentWord = word;

      document.getElementById(cfg.countId).textContent = cfg.countValue;
      document.getElementById(cfg.wordId).textContent = word ? word.en : "Kelime yok";
      document.getElementById(cfg.hintBoxId).style.display = "none";
      document.getElementById(cfg.hintTextId).textContent = "";
      document.getElementById(cfg.hintImageId).style.display = "none";
      document.getElementById(cfg.hintImageId).src = "";
      document.getElementById(cfg.statusId).textContent = "";

      const choicesBox = document.getElementById(cfg.choicesId);
      choicesBox.innerHTML = "";

      if (!word) return;

      buildChoices(word).forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = choice;

        btn.addEventListener("click", () => {
          document.querySelectorAll(`#${cfg.choicesId} .choice-btn`).forEach(b => {
            b.disabled = true;
            if (b.textContent === word.tr) b.classList.add("correct");
          });
          if (choice !== word.tr) {
            btn.classList.add("wrong");
          }
        });

        choicesBox.appendChild(btn);
      });
    }

    function renderReviewQuestion() {
      show("reviewScreen");

      if (!reviewWords.length) {
        document.getElementById("reviewCount").textContent = "0/0";
        document.getElementById("reviewWord").textContent = "Kelime yok";
        document.getElementById("reviewChoices").innerHTML = "";
        updateReviewNavButtons();
        return;
      }

      if (reviewIndex < 0) reviewIndex = 0;
      if (reviewIndex >= reviewWords.length) reviewIndex = reviewWords.length - 1;

      renderSecondaryQuestion(reviewWords[reviewIndex], {
        countId: "reviewCount",
        countValue: `${reviewIndex + 1}/${reviewWords.length}`,
        wordId: "reviewWord",
        choicesId: "reviewChoices",
        hintBoxId: "reviewHintBox",
        hintTextId: "reviewHintText",
        hintImageId: "reviewHintImage",
        statusId: "reviewStatus"
      });

      updateReviewNavButtons();
    }

    function renderCompletedQuestion() {
      show("completedScreen");

      if (!completedWords.length) {
        document.getElementById("completedCount").textContent = "0/0";
        document.getElementById("completedWord").textContent = "Kelime yok";
        document.getElementById("completedChoices").innerHTML = "";
        updateCompletedNavButtons();
        return;
      }

      if (completedIndex < 0) completedIndex = 0;
      if (completedIndex >= completedWords.length) completedIndex = completedWords.length - 1;

      renderSecondaryQuestion(completedWords[completedIndex], {
        countId: "completedCount",
        countValue: `${completedIndex + 1}/${completedWords.length}`,
        wordId: "completedWord",
        choicesId: "completedChoices",
        hintBoxId: "completedHintBox",
        hintTextId: "completedHintText",
        hintImageId: "completedHintImage",
        statusId: "completedStatus"
      });

      updateCompletedNavButtons();
    }

    function startTest() {
  resetSessionStats();

  const filteredWords = WORDS.filter(
    w => !completedWords.some(c => c.en === w.en)
  );

  if (!filteredWords.length) {
    alert("Tüm kelimeler tamamlananlara eklendi.");
    showHome();
    return;
  }

  sessionWords = shuffle(filteredWords).map(w => ({ ...w }));
  currentIndex = 0;
  renderMainQuestion();
}

    function goPrevWord() {
      if (currentIndex > 0) {
        currentIndex--;
        renderMainQuestion();
      }
    }

    function goNextWord() {
      if (currentIndex < sessionWords.length - 1) {
        currentIndex++;
        renderMainQuestion();
      }
    }

    function openReviewTest() {
      reviewIndex = 0;
      renderReviewQuestion();
    }

    function openCompletedTest() {
      completedIndex = 0;
      renderCompletedQuestion();
    }

    function goReviewPrev() {
      if (reviewIndex > 0) {
        reviewIndex--;
        renderReviewQuestion();
      }
    }

    function goReviewNext() {
      if (reviewIndex < reviewWords.length - 1) {
        reviewIndex++;
        renderReviewQuestion();
      }
    }

    function goCompletedPrev() {
      if (completedIndex > 0) {
        completedIndex--;
        renderCompletedQuestion();
      }
    }

    function goCompletedNext() {
      if (completedIndex < completedWords.length - 1) {
        completedIndex++;
        renderCompletedQuestion();
      }
    }

    function getCorrectCount() {
      return Object.values(answeredMap).filter(v => v.result === "correct").length;
    }

    function getWrongCount() {
      return Object.values(answeredMap).filter(v => v.result === "wrong").length;
    }

    function openResultSilently() {
      document.getElementById("statTotalWords").textContent = WORDS.length;
      document.getElementById("statAnswered").textContent = Object.keys(answeredMap).length;
      document.getElementById("statCorrect").textContent = getCorrectCount();
      document.getElementById("statWrong").textContent = getWrongCount();
    }

    function openResult() {
      show("statsScreen");
      openResultSilently();
    }

    function addCompleted() {
      if (!currentWord) return;
      uniquePushWord(completedWords, currentWord);
      reviewWords = removeWord(reviewWords, currentWord);
      savePersistentState();
      renderMainQuestion();
    }

    function addReview() {
      if (!currentWord) return;
      uniquePushWord(reviewWords, currentWord);
      completedWords = removeWord(completedWords, currentWord);
      savePersistentState();
      renderMainQuestion();
    }

    function moveToCompleted() {
      if (!currentWord) return;
      uniquePushWord(completedWords, currentWord);
      reviewWords = removeWord(reviewWords, currentWord);

      if (reviewIndex >= reviewWords.length) {
        reviewIndex = Math.max(0, reviewWords.length - 1);
      }

      savePersistentState();
      renderReviewQuestion();
    }

    function moveCompletedToReview() {
      if (!currentWord) return;
      uniquePushWord(reviewWords, currentWord);
      completedWords = removeWord(completedWords, currentWord);

      if (completedIndex >= completedWords.length) {
        completedIndex = Math.max(0, completedWords.length - 1);
      }

      savePersistentState();
      renderCompletedQuestion();
    }

    function resetStats() {
      resetSessionStats();
      openResult();
    }

    function showClearModal() {
      document.getElementById("clearModal").style.display = "block";
    }

    function hideClearModal() {
      document.getElementById("clearModal").style.display = "none";
    }

    function clearAllData() {
      completedWords = [];
      reviewWords = [];
      resetSessionStats();

      localStorage.removeItem("wowCompletedWords");
      localStorage.removeItem("wowReviewWords");

      hideClearModal();
      showHome();
    }

    document.getElementById("startTestBtn").addEventListener("click", startTest);
    document.getElementById("showStatsBtn").addEventListener("click", openResult);
    document.getElementById("showCompletedBtn").addEventListener("click", openCompletedTest);
    document.getElementById("showReviewBtn").addEventListener("click", openReviewTest);
    document.getElementById("clearAllBtn").addEventListener("click", showClearModal);

    document.getElementById("speakBtn").addEventListener("click", () => speakWord(currentWord));
    document.getElementById("hintBtn").addEventListener("click", () => currentWord && renderHint("hintBox", "hintText", "hintImage", currentWord));
    document.getElementById("prevBtn").addEventListener("click", goPrevWord);
    document.getElementById("nextBtn").addEventListener("click", goNextWord);
    document.getElementById("addCompletedBtn").addEventListener("click", addCompleted);
    document.getElementById("addReviewBtn").addEventListener("click", addReview);
    document.getElementById("testHomeBtn").addEventListener("click", showHome);

    document.getElementById("reviewSpeakBtn").addEventListener("click", () => speakWord(currentWord));
    document.getElementById("reviewHintBtn").addEventListener("click", () => currentWord && renderHint("reviewHintBox", "reviewHintText", "reviewHintImage", currentWord));
    document.getElementById("reviewPrevBtn").addEventListener("click", goReviewPrev);
    document.getElementById("reviewNextBtn").addEventListener("click", goReviewNext);
    document.getElementById("reviewAddCompletedBtn").addEventListener("click", moveToCompleted);
    document.getElementById("reviewHomeBtn").addEventListener("click", showHome);

    document.getElementById("completedSpeakBtn").addEventListener("click", () => speakWord(currentWord));
    document.getElementById("completedHintBtn").addEventListener("click", () => currentWord && renderHint("completedHintBox", "completedHintText", "completedHintImage", currentWord));
    document.getElementById("completedPrevBtn").addEventListener("click", goCompletedPrev);
    document.getElementById("completedNextBtn").addEventListener("click", goCompletedNext);
    document.getElementById("completedAddReviewBtn").addEventListener("click", moveCompletedToReview);
    document.getElementById("completedHomeBtn").addEventListener("click", showHome);

    document.getElementById("resetStatsBtn").addEventListener("click", resetStats);
    document.getElementById("statsHomeBtn").addEventListener("click", showHome);

    document.getElementById("confirmClearBtn").addEventListener("click", clearAllData);
    document.getElementById("cancelClearBtn").addEventListener("click", hideClearModal);

    document.addEventListener("dblclick", function (e) {
      e.preventDefault();
    }, { passive: false });

    loadState();
    showHome();
  </script>
</body>
</html>
